<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="icon" href="./imgs/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCP - Jornal Colégio Professores</title>
</head>

<body>
    <header>
        <button><i class="fa-solid fa-bars"></i></button>
        <h1></h1>
        <img id="header_logo" src="./imgs/black-logo-512x.png" alt="Logo do Jornal">
    </header>

    <nav>
        <ul id="side_items">
            <li class="side_item active">
                <a href="#">
                    <i class="fa-solid fa-house"></i>
                    <span class="item-description">Início</span>
                </a>
            </li>

            <li class="side_item">
                <a href="#">
                    <i class="fa-solid fa-door-open"></i>
                    <span class="item-description">Acolhimento</span>
                </a>
            </li>

            <li class="side_item">
                <a href="#">
                    <i class="fa-solid fa-landmark"></i>
                    <span class="item-description">Cultura</span>
                </a>
            </li>

            <li class="side_item">
                <a href="#">
                    <i class="fa-solid fa-futbol"></i>
                    <span class="item-description">Esportes</span>
                </a>
            </li>

            <li class="side_item">
                <a href="#">
                    <i class="fa-solid fa-calendar"></i>
                    <span class="item-description">Eventos</span>
                </a>
            </li>

            <li class="side_item">
                <a href="#">
                    <i class="fa-solid fa-plus"></i>
                    <span class="item-description">Outros</span>
                </a>
            </li>
        </ul>
    </nav>

    <main>
        <section class="container">
            <img class="news-bg" src="./pages/entrega-dos-kits-escolares/capa.png"
                alt="Imagem dos alunos recebendo os kits escolares.">
            <div class="news-cover">
                <h2 class="news-title">Entrega do Material Escolar</h2>
                <span>Igualdade, qualidade e responsabilidade.</span>
            </div>
        </section>
        <section class="container"></section>
    </main>

    <script src="./js/index.js"></script>
</body>

</html>
